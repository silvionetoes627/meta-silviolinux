# /etc/opkg/aurora.conf
# Configurações específicas do codinome "Aurora" (SilvioLinux 1.0)

option lists_dir /var/lib/opkg/lists/aurora
option overlay_root /media/root-overlay

# Identificação do release usada por scripts de manutenção do opkg
option release "aurora-1.0"
option release_url "https://silviolinux.dev.br/aurora"
option gitweb_url "https://git.silviolinux.dev.br/silviolinux"

# Espelho de fallback, caso o feed principal esteja indisponível
src/gz silviolinux-mirror https://mirror.silviolinux.dev.br/aurora/base
