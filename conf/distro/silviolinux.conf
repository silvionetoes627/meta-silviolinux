# ---------------------------------------------------------------------------
# conf/distro/silviolinux.conf
# SilvioLinux Minimal 1.0 "Aurora"
# Distribuição derivada do Poky (Yocto Project 5.0 Scarthgap)
# Perfil: 32-bit, ultra-minimalista, sem gerenciador de janelas
# ---------------------------------------------------------------------------

require conf/distro/poky.conf

# --- Identidade da distro ---------------------------------------------------
DISTRO = "silviolinux"
DISTRO_NAME = "SilvioLinux Minimal"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "Aurora"
DISTRO_DESCRIPTION = "SilvioLinux Minimal 1.0 (Aurora) - Mini distribuição Linux 32-bit ultra-minimalista, sem WM, baseada em Poky/Yocto 5.0 Scarthgap"
DISTRO_HOME_URL = "https://silviolinux.dev.br"
MAINTAINER = "Sílvio <contato@silviolinux.dev.br>"

SILVIOLINUX_VERSION = "1.0"
SILVIOLINUX_CODENAME = "Aurora"

# --- Sanidade / compatibilidade --------------------------------------------
require conf/distro/sanity.conf

# --- Arquitetura alvo: 32-bit ------------------------------------------------
# Uso recomendado com MACHINE = "qemux86" ou similar i586/i686.
DEFAULTTUNE ?= "i586"
TCLIBC ?= "musl"
TARGET_ARCH = "i586"

# --- Gerenciamento de pacotes: opkg (formato ipk) ---------------------------
PACKAGE_CLASSES ?= "package_ipk"
IMAGE_FEATURES += "package-management"

# --- Sistema de init minimalista, sem systemd -------------------------------
DISTRO_FEATURES:remove = "systemd wayland x11 opengl vulkan pulseaudio bluetooth 3g nfc wifi"
VIRTUAL-RUNTIME_init_manager = "sysvinit"
VIRTUAL-RUNTIME_initscripts = "initscripts"
DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit systemd"
INIT_MANAGER = "sysvinit"

# --- Sem gerenciador de janelas / sem GUI -----------------------------------
DISTRO_FEATURES:remove += "x11 wayland directfb"
DISTRO_FEATURES:append = " ext2 largefile pcmcia usbgadget usbhost"

# --- Ferramentas mínimas garantidas na imagem base --------------------------
# Apenas: vim, vi (provido pelo busybox ou vim-tiny), nano, curl, wget
DISTRO_EXTRA_RDEPENDS += "vim nano curl wget"

# --- Sistema de arquivos raiz e imagem ---------------------------------------
IMAGE_FSTYPES ?= "ext4"
SILVIOLINUX_IMAGE_FSTYPE = "ext4"

# --- Bootloader: GRUB sem imagem de fundo -----------------------------------
PREFERRED_PROVIDER_virtual/bootloader = "grub"
GRUB_GFXSERIAL = "0"
SILVIOLINUX_GRUB_BACKGROUND = ""

# --- Versões / rótulos -------------------------------------------------------
DISTRO_VERSION = "${SILVIOLINUX_VERSION}-${SILVIOLINUX_CODENAME}"
SDK_VENDOR = "-silviolinuxsdk"
SDK_VERSION = "${@d.getVar('DISTRO_VERSION').replace('snapshot-${METADATA_REVISION}', 'snapshot')}"

# --- Licenciamento padrão ----------------------------------------------------
LICENSE_FLAGS_ACCEPTED += "commercial_curl commercial_wget"

# --- Repositórios opkg (feeds) usados na imagem final -----------------------
SILVIOLINUX_OPKG_FEED_BASE = "https://packages.silviolinux.dev.br/aurora"
