# ---------------------------------------------------------------------------
# conf/distro/sanity.conf
# Verificações de sanidade / compatibilidade da distro SilvioLinux Minimal
# ---------------------------------------------------------------------------

# Versão mínima do BitBake exigida (compatível com Poky 5.0 Scarthgap)
BB_MIN_VERSION = "2.8.0"

# Série de camadas suportada por esta distro
LAYERSERIES_CORENAMES = "scarthgap"
LAYERSERIES_COMPAT_silviolinux = "scarthgap"

# Distros com as quais o SilvioLinux foi testado (checagem do sanity.bbclass)
SANITY_TESTED_DISTROS ?= " \
    silviolinux-1.0 \
    poky-5.0 \
    ubuntu-22.04 \
    ubuntu-24.04 \
    debian-12 \
"

# Máquinas de referência suportadas oficialmente (32-bit)
SANITY_TESTED_MACHINES ?= " \
    qemux86 \
    genericx86 \
"

# Aviso de sanidade customizado exibido durante o parse
SANITY_SILVIOLINUX_WARNING = "Aviso: SilvioLinux Minimal 1.0 (Aurora) requer MACHINE de 32-bit (ex.: qemux86, genericx86) e DISTRO = 'silviolinux'."

python silviolinux_sanity_check() {
    distro = d.getVar('DISTRO')
    machine = d.getVar('MACHINE')
    if distro != 'silviolinux':
        bb.warn("SilvioLinux: variável DISTRO não está definida como 'silviolinux' (atual: %s)" % distro)
    tune = d.getVar('DEFAULTTUNE') or ''
    if '64' in tune or 'x86-64' in tune:
        bb.warn("SilvioLinux Minimal foi projetado para arquiteturas 32-bit (i586/i686). DEFAULTTUNE atual: %s" % tune)
}

addhandler silviolinux_sanity_check
silviolinux_sanity_check[eventmask] = "bb.event.ConfigParsed"
