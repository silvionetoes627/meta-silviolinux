# ---------------------------------------------------------------------------
# poky/conf/local.conf (exemplo) - SilvioLinux Minimal 1.0 (Aurora)
# Copie este arquivo para <diretorio-de-build>/conf/local.conf
# ---------------------------------------------------------------------------

MACHINE ??= "qemux86"
DISTRO ?= "silviolinux"

# Sistema de arquivos final
IMAGE_FSTYPES = "ext4"

# Formato de imagem WIC com GRUB e ext4, sem imagem de fundo
WKS_FILE = "silviolinux-aurora.wks"

PACKAGE_CLASSES ?= "package_ipk"

# Paralelismo de build (ajuste conforme sua máquina)
BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"
PARALLEL_MAKE ?= "-j ${@oe.utils.cpu_count()}"

DL_DIR ?= "${TOPDIR}/downloads"
SSTATE_DIR ?= "${TOPDIR}/sstate-cache"

CONF_VERSION = "2"

# Camadas necessárias (ver bblayers.conf):
#   meta
#   meta-poky
#   meta-yocto-bsp
#   meta-silviolinux

EXTRA_IMAGE_FEATURES += "package-management"
